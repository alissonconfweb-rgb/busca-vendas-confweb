services:
  - type: web
    name: busca-vendas-confweb
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --include=dev && npx playwright install chromium && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: CREATOR_EMAIL
        value: alisson.confweb@gmail.com
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SESSION_TTL_DAYS
        value: "365"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: MELI_REFRESH_TOKEN
        sync: false
      - key: OXYLABS_USERNAME
        sync: false
      - key: OXYLABS_PASSWORD
        sync: false
      - key: OXYLABS_ENDPOINT
        value: https://realtime.oxylabs.io/v1/queries
      - key: OXYLABS_GEO_LOCATION
        value: Brazil
